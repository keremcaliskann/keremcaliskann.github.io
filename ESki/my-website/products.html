<!DOCTYPE html>
<html lang="tr">

{{>head}}

<body class="d-flex flex-column min-vh-100 bg-light">

    {{>navbar}}

    {{>banner}}

    <main class="container my-5 flex-grow-1">

        <div class="row align-items-center mb-5">
            <div class="col-md-5">
                <h2 class="display-6 fw-bold text-dark mb-0">Tüm Ürünler</h2>
                <p class="text-secondary mt-1 mb-0">Projelerim ve tasarımlarım</p>
            </div>
            <div class="col-md-7 mt-3 mt-md-0 d-flex gap-2 justify-content-md-end">
                <input type="text" class="form-control w-auto shadow-sm border-0 bg-white" placeholder="Ürün ara..."
                    id="searchInput">
            </div>
        </div>

        <div id="loading-spinner" class="text-center my-5 py-5">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
            <h5 class="text-secondary mt-3">Ürünler Yükleniyor...</h5>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 d-none" id="products-grid">

        </div>
    </main>

    {{>footer}}

    <script type="module" src="/src/products.js"></script>

</body>

</html>

<style>
    /* Ürün Kartı Hover Efekti */
    .product-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1) !important;
    }

    /* Resim Alanı Tutucu (Firebase'den resim gelene kadar) */
    .img-placeholder {
        height: 220px;
        background-color: #f8f9fa;
        border-bottom: 1px solid #f1f1f1;
    }
</style>
