<div>
    <tr>
        <td class="fw-medium text-dark py-3">
            <div class="img-placeholder d-flex justify-content-center align-items-center" {{image}}>
            </div>
        </td>

        <td class="fw-medium text-dark py-3">
            <p>{{title}}</p>
        </td>

        <td>
            {{isActive}}
        </td>

        <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary rounded-circle project-edit-btn" data-id="{{id}}"
                data-bs-toggle="modal" data-bs-target="#addProjectModal" title="Edit"><i
                    class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger rounded-circle project-delete-btn" data-id="{{id}}" title="Delete">
                <i class="bi bi-trash pointer-events-none"></i>
            </button>
        </td>
    </tr>
</div>
