<!DOCTYPE html>
<html lang="tr">

{{>head}}

<body class="d-flex align-items-center py-4 bg-light min-vh-100">

    <main class="w-100 m-auto" style="max-width: 400px;">
        <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border border-light">

            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm"
                    style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 class="h3 fw-bold text-dark mb-1">Hoş Geldiniz</h1>
                <p class="text-muted">Devam etmek için lütfen giriş yapın.</p>
            </div>

            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input id="email" type="email" class="form-control rounded-3" id="floatingInput" placeholder="name@example.com"
                        required>
                    <label for="floatingInput">E-posta Adresi</label>
                </div>

                <div class="form-floating mb-4">
                    <input id="password" type="password" class="form-control rounded-3" id="floatingPassword" placeholder="Şifre"
                        required>
                    <label for="floatingPassword">Şifre</label>
                </div>

                <button class="w-100 btn btn-primary btn-lg rounded-pill fw-medium shadow-sm mb-3" type="submit">
                    Giriş Yap <i class="bi bi-box-arrow-in-right ms-1"></i>
                </button>
            </form>

        </div>
    </main>
</body>

<script type="module" src="./src/login.js"></script>

</html>
