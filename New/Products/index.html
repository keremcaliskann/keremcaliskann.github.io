<!DOCTYPE html>
<html lang="tr">

<head>
    <title>KC - Ürünler</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <style>
        body {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        /* Ürün Kartı Hover Efekti */
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1) !important;
        }
        /* Resim Alanı Tutucu (Firebase'den resim gelene kadar) */
        .img-placeholder {
            height: 220px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #f1f1f1;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <div id="navbar-container"></div>
    <div id="banner-container"></div>

    <main class="container my-5 flex-grow-1">
        
        <div class="row align-items-center mb-5">
            <div class="col-md-5">
                <h2 class="display-6 fw-bold text-dark mb-0">Tüm Ürünler</h2>
                <p class="text-secondary mt-1 mb-0">Projelerim ve tasarımlarım</p>
            </div>
            <div class="col-md-7 mt-3 mt-md-0 d-flex gap-2 justify-content-md-end">
                <input type="text" class="form-control w-auto shadow-sm border-0 bg-white" placeholder="Ürün ara..." id="searchInput">
            </div>
        </div>

        <div id="loading-spinner" class="text-center my-5 py-5">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
            <h5 class="text-secondary mt-3">Ürünler Yükleniyor...</h5>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 d-none" id="products-grid">
            
            <div class="col">
                <div class="card h-100 border-0 shadow-sm rounded-4 product-card overflow-hidden">
                    <div class="img-placeholder d-flex justify-content-center align-items-center">
                        <i class="bi bi-box-seam display-1 text-secondary opacity-25"></i>
                    </div>
                    <div class="card-body d-flex flex-column p-4">
                        <span class="badge bg-primary bg-opacity-10 text-primary mb-3 align-self-start px-2 py-1">Kategori Gelecek</span>
                        <h5 class="card-title fw-bold text-dark">Ürün Adı Gelecek</h5>
                        <p class="card-text text-secondary small mb-4">Ürün açıklaması burada yer alacak. Firebase'den çekilen veri buraya basılacak.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fs-5 fw-bold text-dark">₺0.00</span>
                            <button class="btn btn-dark rounded-pill px-4 py-2 btn-sm fw-medium">
                                İncele <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <footer id="footer-container" class="bg-dark text-white pt-5 pb-3 mt-auto"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="index.js"></script>

</body>
</html>
