<div class="col">
    <div class="card h-100 border-0 shadow-sm rounded-4 product-card overflow-hidden">
        <div class="img-placeholder d-flex justify-content-center align-items-center" {{image}}>
        </div>
        <div class="card-body d-flex flex-column p-4">
            <h5 class="card-title fw-bold text-dark">{{title}}</h5>
            <p class="card-text text-secondary small mb-4">{{description}}</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
                <a href="{{link}}" class="btn btn-dark rounded-pill px-4 py-2 btn-sm fw-medium">
                    İncele <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
</div>
