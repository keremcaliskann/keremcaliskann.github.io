<div id="projects-content" class="content-section d-none">
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
        <h1 class="h3 fw-bold text-dark mb-0">Projects</h1>
        <button class="btn btn-primary rounded-pill px-4 py-2 btn-sm fw-medium shadow-sm" data-bs-toggle="modal"
            data-bs-target="#addProjectModal">
            <i class="bi bi-plus-lg me-1"></i> Add
        </button>
    </div>

    <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th scope="col" class="py-3 rounded-start">Image</th>
                        <th scope="col" class="py-3">Title</th>
                        <th scope="col" class="py-3">State</th>
                        <th scope="col" class="py-3 text-end rounded-end"></th>
                    </tr>
                </thead>
                <tbody id="projects-table">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addProjectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content rounded-4 border-0 shadow">

            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold">New</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="addNewForm">

                    <!-- ID + Active/Passive -->
                    <div class="d-flex align-items-center justify-content-between mb-3 p-3 bg-light rounded-3">
                        <div>
                            <span class="text-secondary small">ID</span>
                            <div class="fw-bold" id="displayId">—</div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="small text-secondary" id="statusLabel">Passive</span>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" id="isActiveSwitch"
                                    style="width:2.5em; height:1.3em; cursor:pointer;"
                                    onchange="document.getElementById('statusLabel').textContent = this.checked ? 'Active' : 'Passive'">
                            </div>
                        </div>
                    </div>

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label text-secondary small mb-1">Title</label>
                        <input type="text" class="form-control rounded-3" id="titleInput" placeholder="Başlık girin"
                            required>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label class="form-label text-secondary small mb-1">Description</label>
                        <textarea class="form-control rounded-3" id="descriptionInput" rows="3"
                            placeholder="Açıklama girin"></textarea>
                    </div>

                    <!-- Link -->
                    <div class="mb-3">
                        <label class="form-label text-secondary small mb-1">Link</label>
                        <input type="url" class="form-control rounded-3" id="linkInput" placeholder="https://...">
                    </div>

                    <!-- Dynamic Tag List -->
                    <div class="mb-3">
                        <label class="form-label text-secondary small mb-1">Images</label>
                        <div id="imageList" class="d-flex flex-column gap-2"></div>
                        <button type="button" class="btn btn-outline-primary btn-sm rounded-pill mt-2 px-3"
                            onclick="addImageInput()">
                            <i class="bi bi-plus-lg me-1"></i> Add
                        </button>
                    </div>

                </form>
            </div>

            <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary rounded-pill px-4" onclick="handleSave()">Confirm</button>
            </div>

        </div>
    </div>
</div>
